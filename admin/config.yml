backend:
  name: github
  repo: TejasweeSulekh/blog-source
  branch: main 
  use_graphql: false # Turned off to ensure reliable fetching
  base_url: https://sveltia-cms-auth.t-sulekh312.workers.dev

media_folder: "public"
public_folder: "/"

collections:
  # ==========================================
  # 🌐 PUBLIC TRANSMISSIONS (Unencrypted)
  # ==========================================

  - name: "public_projects"
    label: "🌐 Public Projects"
    folder: "src/content/posts/projects"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - {label: "Transmission Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "hidden", default: "projects"}
      - {label: "System Description", name: "description", widget: "text"}
      - {label: "Timestamp", name: "date", widget: "datetime"}
      - {label: "Author ID", name: "author", widget: "string", default: "SYS_ADMIN"}
      - {label: "Cover Image", name: "coverImage", widget: "image", required: false, default: "/default_image_for_blog.png"}
      - {label: "Tech Stack / Tags", name: "tags", widget: "list", required: false}
      - {label: "Read Time (Minutes)", name: "readTime", widget: "number", value_type: "int", required: false}
      - {label: "Preview Code (Terminal UI)", name: "previewCode", widget: "text", required: false}
      - {label: "Project ID", name: "projectId", widget: "string", required: false, hint: "Give this project a unique ID (e.g., 'fraud-system')."}
      - {label: "Related Project", name: "relatedProject", widget: "string", required: false}
      - {label: "Payload / Markdown Body", name: "body", widget: "markdown"}

  - name: "public_blogs"
    label: "🌐 Public Blogs"
    folder: "src/content/posts/blog"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - {label: "Transmission Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "hidden", default: "blog"}
      - {label: "System Description", name: "description", widget: "text"}
      - {label: "Timestamp", name: "date", widget: "datetime"}
      - {label: "Author ID", name: "author", widget: "string", default: "SYS_ADMIN"}
      - {label: "Cover Image", name: "coverImage", widget: "image", required: false, default: "/default_image_for_blog.png"}
      - {label: "Tech Stack / Tags", name: "tags", widget: "list", required: false}
      - {label: "Read Time (Minutes)", name: "readTime", widget: "number", value_type: "int", required: false}
      - {label: "Preview Code (Terminal UI)", name: "previewCode", widget: "text", required: false}
      - {label: "Project ID", name: "projectId", widget: "string", required: false}
      - {label: "Related Project", name: "relatedProject", widget: "string", required: false, hint: "Link to a Project ID if relevant."}
      - {label: "Payload / Markdown Body", name: "body", widget: "markdown"}

  - name: "public_logs"
    label: "🌐 Public Logs"
    folder: "src/content/posts" # Saves directly to the root of the posts folder
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - {label: "Transmission Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "hidden", default: "log"}
      - {label: "System Description", name: "description", widget: "text"}
      - {label: "Timestamp", name: "date", widget: "datetime"}
      - {label: "Author ID", name: "author", widget: "string", default: "SYS_ADMIN"}
      - {label: "Cover Image", name: "coverImage", widget: "image", required: false, default: "/default_image_for_blog.png"}
      - {label: "Tech Stack / Tags", name: "tags", widget: "list", required: false}
      - {label: "Read Time (Minutes)", name: "readTime", widget: "number", value_type: "int", required: false}
      - {label: "Preview Code (Terminal UI)", name: "previewCode", widget: "text", required: false}
      - {label: "Project ID", name: "projectId", widget: "string", required: false}
      - {label: "Related Project", name: "relatedProject", widget: "string", required: false, hint: "Link to a Project ID if relevant."}
      - {label: "Payload / Markdown Body", name: "body", widget: "markdown"}

  # ==========================================
  # 🔒 ENCRYPTED VAULT LOGS
  # ==========================================

  - name: "vault_projects"
    label: "🔒 Vault Projects"
    folder: "src/content/vault/projects"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - {label: "Transmission Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "hidden", default: "projects"}
      - {label: "System Description", name: "description", widget: "text"}
      - {label: "Timestamp", name: "date", widget: "datetime"}
      - {label: "Author ID", name: "author", widget: "string", default: "SYS_ADMIN"}
      - {label: "Cover Image", name: "coverImage", widget: "image", required: false}
      - {label: "Tech Stack / Tags", name: "tags", widget: "list", required: false}
      - {label: "Read Time (Minutes)", name: "readTime", widget: "number", value_type: "int", required: false}
      - {label: "Preview Code (Terminal UI)", name: "previewCode", widget: "text", required: false}
      - {label: "Project ID", name: "projectId", widget: "string", required: false, hint: "Give this project a unique ID (e.g., 'fraud-system')."}
      - {label: "Related Project", name: "relatedProject", widget: "string", required: false}
      - {label: "Payload / Markdown Body", name: "body", widget: "markdown"}

  - name: "vault_blogs"
    label: "🔒 Vault Blogs"
    folder: "src/content/vault/blog"
